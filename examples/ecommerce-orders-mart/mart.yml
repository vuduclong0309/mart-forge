mart:
  name: ecommerce-orders-mart
  db_name: ecommerce_db
  prefix: ecom
  grain: per-order-line-per-day
  version: "1.0"

providers:
  primary: csv_seed
  fallback: null
  auth_required: false

schedule:
  cron: "0 6 * * *"
  timezone: America/New_York
  skip_holidays: false

pipeline:
  steps: [seed, run, test]
  fail_fast: true
  timeout_minutes: 5

dqc:
  control_catalog: required
  scorecard_artifact: dqc_scorecard.json
  reconciliation:
    - metric: total_revenue
      source: raw_orders_seed
      tolerance: 0.01
      severity: error
    - metric: total_order_count
      source: raw_orders_seed
      tolerance: 0
      severity: error
