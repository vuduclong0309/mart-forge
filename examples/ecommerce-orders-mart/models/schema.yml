version: 2

models:
  # --- ODS Layer ---
  - name: ecom_ods_raw_orders
    description: "ODS layer: raw order lines from CSV seed with provenance columns"
    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null
      - name: line_id
        description: "Line item number within order"
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ["complete", "pending", "cancelled", "refunded"]

  - name: ecom_ods_raw_customers
    description: "ODS layer: raw customer records with tier history for SCD Type 2"
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: tier
        tests:
          - accepted_values:
              values: ["bronze", "silver", "gold"]

  - name: ecom_ods_raw_products
    description: "ODS layer: raw product catalog"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  # --- DIM Layer ---
  - name: ecom_dim_date
    description: "Conformed date dimension (role-playing). Grain: one row per calendar day."
    columns:
      - name: date_key
        description: "Surrogate key (YYYYMMDD integer)"
        tests:
          - not_null
          - unique

  - name: ecom_dim_customer
    description: "Customer dimension with SCD Type 2 history tracking tier changes. Grain: one row per customer per effective period."
    columns:
      - name: customer_sk
        description: "Surrogate key"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Natural key"
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null
      - name: effective_from
        tests:
          - not_null
      - name: effective_to
        tests:
          - not_null

  - name: ecom_dim_product
    description: "Product dimension (SCD Type 1 — overwrite on change). Grain: one row per product."
    columns:
      - name: product_sk
        description: "Surrogate key"
        tests:
          - not_null
          - unique
      - name: product_id
        description: "Natural key"
        tests:
          - not_null

  # --- DWD Layer ---
  - name: ecom_dwd_order_line_di
    description: "Fact table: order lines per day. Grain: one row per order line item."
    columns:
      - name: order_line_sk
        description: "Surrogate key"
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: line_id
        tests:
          - not_null
      - name: customer_sk
        description: "FK to ecom_dim_customer"
        tests:
          - not_null
          - relationships:
              to: ref('ecom_dim_customer')
              field: customer_sk
      - name: product_sk
        description: "FK to ecom_dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('ecom_dim_product')
              field: product_sk
      - name: order_date_key
        description: "FK to ecom_dim_date (role: order date)"
        tests:
          - not_null
          - relationships:
              to: ref('ecom_dim_date')
              field: date_key
      - name: quantity
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ["complete", "pending", "cancelled", "refunded"]

  # --- DWS Layer ---
  - name: ecom_dws_daily_revenue_1d
    description: "Daily revenue aggregation. Grain: one row per day."
    columns:
      - name: order_date_key
        tests:
          - not_null
          - unique
      - name: total_revenue
        tests:
          - not_null
      - name: order_count
        tests:
          - not_null

  - name: ecom_dws_customer_lifetime_td
    description: "Customer lifetime value to-date. Grain: one row per current customer."
    columns:
      - name: customer_sk
        tests:
          - not_null
          - unique
      - name: total_revenue
        tests:
          - not_null

  - name: ecom_dws_product_trend_nd
    description: "Product trend with 7d and 30d rolling windows. Grain: one row per product per day."
    columns:
      - name: product_sk
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null

  # --- ADS Layer ---
  - name: ecom_ads_executive_dashboard
    description: "Executive dashboard one-big-table. Grain: one row per day within order date range."
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: total_revenue
        tests:
          - not_null
