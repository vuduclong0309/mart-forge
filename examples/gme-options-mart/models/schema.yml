version: 2

models:
  # --- ODS Layer ---
  - name: gme_ods_cboe_options_chain
    description: "ODS layer: raw GME options chain from CBOE delayed quotes (httpfs). Grain: one row per option contract per pull."
    columns:
      - name: option_symbol
        description: "OCC option symbol (e.g. GME260620C00025000)"
        data_tests:
          - not_null
      - name: pull_date
        data_tests:
          - not_null
      - name: ticker
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GME"]
      - name: provider
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cboe"]
      - name: pull_ts_utc
        data_tests:
          - not_null
      - name: quote_ts_utc
        description: "Source-side timestamp from CBOE delayed quotes feed"
        data_tests:
          - not_null
      - name: run_id
        description: "Pipeline execution identifier for lineage tracing"
        data_tests:
          - not_null
      - name: option_type
        data_tests:
          - accepted_values:
              arguments:
                values: ["call", "put"]
      - name: strike
        description: "Option strike price. May be null for non-standard OCC symbols at ODS level — filtered in DWD."
        data_tests:
          - not_null:
              config:
                severity: warn

  # --- DIM Layer ---
  - name: gme_dim_date
    description: "Conformed date dimension (role-playing). Grain: one row per calendar day."
    columns:
      - name: date_key
        description: "Surrogate key (YYYYMMDD integer)"
        data_tests:
          - not_null
          - unique
      - name: full_date
        data_tests:
          - not_null
          - unique
      - name: is_trading_day
        data_tests:
          - not_null

  # --- DWD Layer ---
  - name: gme_dwd_option_contract_di
    description: "Fact table: cleaned option contracts per day. Grain: one row per contract (strike x expiry x type) per day. GEX computed, series classified."
    columns:
      - name: option_symbol
        description: "OCC symbol — unique within pull_date"
        data_tests:
          - not_null
      - name: pull_date
        data_tests:
          - not_null
      - name: strike
        data_tests:
          - not_null
      - name: expiry
        data_tests:
          - not_null
      - name: option_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["call", "put"]
      - name: open_interest
        data_tests:
          - not_null
      - name: gex_contribution
        data_tests:
          - not_null
      - name: series_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["WEEKLY", "MONTHLY", "LEAP"]

  # --- DWS Layer ---
  - name: gme_dws_strike_gex_1d
    description: "Net GEX by strike, daily. Grain: one row per strike per expiry per day."
    columns:
      - name: pull_date
        data_tests:
          - not_null
      - name: strike
        data_tests:
          - not_null
      - name: net_gex
        data_tests:
          - not_null
      - name: gex_rank
        data_tests:
          - not_null

  - name: gme_dws_daily_snapshot_1d
    description: "Daily market summary: spot, GEX, max pain, P/C ratio, top OI strikes. Grain: one row per day."
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
      - name: spot
        data_tests:
          - not_null
      - name: pc_ratio
        data_tests:
          - not_null

  - name: gme_dws_options_metrics_1d
    description: >
      Phase-1 options metrics: gamma_flip_point, iv30, hv20, iv_rank,
      oi_daily_delta, dealer_net_gamma, iv_percentile.
      Grain: one row per pull_date for ticker GME (single-ticker public example).
      iv_rank and iv_percentile use a 252-observation session window;
      NULL when fewer than 20 sessions available (documented fixture limitation).
      hv20 uses 20 log-returns (21 closes). oi_daily_delta is NULL on first observation.
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
      - name: ticker
        description: "Underlying ticker symbol. Single-ticker example: GME only."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GME"]
      - name: gamma_flip_point
        description: >
          Strike where cumulative net GEX crosses zero (linear interpolation).
          Fallback: nearest-to-zero cumulative strike when no crossing exists.
        data_tests:
          - not_null
      - name: iv30
        description: "OI-weighted average IV for near-30-DTE contracts (20-40 DTE window)."
        data_tests:
          - not_null
      - name: hv20
        description: >
          Annualized historical volatility from 20 log-returns (21 closes).
          Source: gme_underlying_closes seed (Yahoo Finance chart API daily closes).
          Joined as latest available trade_date <= pull_date to tolerate seed lag.
      - name: iv_rank
        description: >
          (current_iv30 - min_iv30_252d) / (max_iv30_252d - min_iv30_252d).
          Uses 252-observation session window (not calendar days).
          NULL when fewer than 20 sessions of iv30 history available.
      - name: oi_daily_delta
        description: >
          Change in total open interest vs previous pull_date.
          NULL on first observation (no prior day to compare).
      - name: dealer_net_gamma
        description: "Total dealer gamma exposure: sum of per-contract GEX contribution."
        data_tests:
          - not_null
      - name: iv_percentile
        description: >
          Fraction of 252-session window where iv30 was below current iv30.
          Uses observation count, not calendar days.
          NULL when fewer than 20 sessions of iv30 history available.

  - name: gme_dws_social_sentiment_1d
    description: >
      Daily social sentiment aggregates from seed fixture.
      Grain: one row per pull_date for ticker GME (single-ticker public example).
      Seed/fixture-only; no live fetch code exists in this repo.
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
      - name: ticker
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GME"]
      - name: social_mention_count
        description: "Total social mentions for the ticker on this day."
        data_tests:
          - not_null
      - name: social_sentiment_score
        description: "Mention-weighted average sentiment score (-1 to 1)."

  # --- ADS Layer ---
  - name: gme_ads_market_dashboard
    description: >
      One-big-table combining daily snapshot and Phase-1 options metrics
      with calendar attributes for dashboard consumption. Grain: one row per day.
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('gme_dim_date')
                field: full_date
      - name: spot
        data_tests:
          - not_null
      - name: ticker
        data_tests:
          - not_null
      - name: gamma_flip_point
        description: "Strike where cumulative net GEX crosses zero."
        data_tests:
          - not_null
      - name: iv30
        description: "OI-weighted average IV for near-30-DTE contracts."
        data_tests:
          - not_null
      - name: dealer_net_gamma
        description: "Total dealer gamma exposure."
        data_tests:
          - not_null
      - name: social_mention_count
        description: "Total social mentions from seed fixture (NULL when no sentiment data for the day)."
      - name: social_sentiment_score
        description: "Mention-weighted average sentiment score (-1 to 1). NULL when no sentiment data for the day."
