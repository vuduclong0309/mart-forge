version: 2

models:
  # --- ODS Layer ---
  - name: gme_ods_cboe_options_chain
    description: "ODS layer: raw GME options chain from CBOE delayed quotes (httpfs). Grain: one row per option contract per pull."
    columns:
      - name: option_symbol
        description: "OCC option symbol (e.g. GME260620C00025000)"
        data_tests:
          - not_null
      - name: pull_date
        data_tests:
          - not_null
      - name: ticker
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["GME"]
      - name: provider
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cboe"]
      - name: pull_ts_utc
        data_tests:
          - not_null
      - name: quote_ts_utc
        description: "Source-side timestamp from CBOE delayed quotes feed"
        data_tests:
          - not_null
      - name: run_id
        description: "Pipeline execution identifier for lineage tracing"
        data_tests:
          - not_null
      - name: option_type
        data_tests:
          - accepted_values:
              arguments:
                values: ["call", "put"]
      - name: strike
        description: "Option strike price. May be null for non-standard OCC symbols at ODS level — filtered in DWD."
        data_tests:
          - not_null:
              config:
                severity: warn

  # --- DIM Layer ---
  - name: gme_dim_date
    description: "Conformed date dimension (role-playing). Grain: one row per calendar day."
    columns:
      - name: date_key
        description: "Surrogate key (YYYYMMDD integer)"
        data_tests:
          - not_null
          - unique
      - name: full_date
        data_tests:
          - not_null
          - unique
      - name: is_trading_day
        data_tests:
          - not_null

  # --- DWD Layer ---
  - name: gme_dwd_option_contract_di
    description: "Fact table: cleaned option contracts per day. Grain: one row per contract (strike x expiry x type) per day. GEX computed, series classified."
    columns:
      - name: option_symbol
        description: "OCC symbol — unique within pull_date"
        data_tests:
          - not_null
      - name: pull_date
        data_tests:
          - not_null
      - name: strike
        data_tests:
          - not_null
      - name: expiry
        data_tests:
          - not_null
      - name: option_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["call", "put"]
      - name: open_interest
        data_tests:
          - not_null
      - name: gex_contribution
        data_tests:
          - not_null
      - name: series_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["WEEKLY", "MONTHLY", "LEAP"]

  # --- DWS Layer ---
  - name: gme_dws_strike_gex_1d
    description: "Net GEX by strike, daily. Grain: one row per strike per expiry per day."
    columns:
      - name: pull_date
        data_tests:
          - not_null
      - name: strike
        data_tests:
          - not_null
      - name: net_gex
        data_tests:
          - not_null
      - name: gex_rank
        data_tests:
          - not_null

  - name: gme_dws_daily_snapshot_1d
    description: "Daily market summary: spot, GEX, max pain, P/C ratio, top OI strikes. Grain: one row per day."
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
      - name: spot
        data_tests:
          - not_null
      - name: pc_ratio
        data_tests:
          - not_null

  # --- ADS Layer ---
  - name: gme_ads_market_dashboard
    description: "One-big-table combining daily snapshot with calendar attributes for dashboard consumption. Grain: one row per day."
    columns:
      - name: pull_date
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('gme_dim_date')
              field: full_date
      - name: spot
        data_tests:
          - not_null
      - name: ticker
        data_tests:
          - not_null
