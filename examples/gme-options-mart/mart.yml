mart:
  name: gme-options-mart
  db_name: gme_options_db
  prefix: gme
  grain: per-contract-per-day
  version: "1.0"

providers:
  primary: cboe
  fallback: null
  auth_required: false
  cboe:
    url: "https://cdn.cboe.com/api/global/delayed_quotes/options/GME.json"
    format: json
    max_object_size: 10485760
    timeout_ms: 30000
    retries: 3
  reconciliation:
    - name: openbb
      role: gex_reconciliation
      install: "pip install 'openbb>=4.5' openbb-tradier"
      probe_command: "python scripts/openbb_gex_probe.py --pretty"
      providers_attempted:
        - cboe
        - yfinance
        - intrinio
        - tradier
      note: "OpenBB probed for independent GEX cross-check. See scripts/openbb_gex_probe.py."

schedule:
  cron: "45 20 * * 1-5"
  timezone: America/New_York
  skip_holidays: true

pipeline:
  steps: [seed, run, test]
  fail_fast: true
  timeout_minutes: 10

dqc:
  control_catalog: required
  scorecard_artifact: dqc_scorecard.json
  reconciliation:
    - metric: gex_total
      source: external_reference
      tolerance: 0.5
      severity: warn
      note: "OpenBB providers probed (cboe, yfinance, intrinio, tradier). yfinance returns options chains without gamma — GEX not computable. intrinio requires credentials. Proxy reconciliation via ODS-to-DWD row count in place."
