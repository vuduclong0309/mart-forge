name: gme_options_mart
version: "1.0.0"
config-version: 2

profile: gme_options_mart

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

clean-targets:
  - target
  - dbt_packages

vars:
  provider_url: "https://cdn.cboe.com/api/global/delayed_quotes/options/GME.json"
  provider_max_object_size: 10485760
  provider_timeout_ms: 30000
  provider_retries: 3
  use_fixture: false

  warrant_strike: 30.0
  warrant_quantity: 100
  warrant_expiry: '2026-12-18'

seeds:
  gme_options_mart:
    +schema: raw
    dim_date:
      +column_types:
        date_key: integer
        full_date: date
        year: integer
        quarter: integer
        month: integer
        month_name: varchar
        day_of_week: integer
        day_name: varchar
        is_weekend: boolean
        is_holiday: boolean
        is_trading_day: boolean

models:
  gme_options_mart:
    ods:
      +materialized: table
    dim:
      +materialized: table
    dwd:
      +materialized: table
    dws:
      +materialized: table
    ads:
      +materialized: table
