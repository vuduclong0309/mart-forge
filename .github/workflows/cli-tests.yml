name: "CLI Gate Tests"

on:
  push:
    paths:
      - "src/**"
      - "templates/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "src/**"
      - "templates/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  cli-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mart-forge with test deps
        run: pip install -e ".[test]"

      - name: Run CLI gate tests
        run: pytest tests/ -v
