name: "Framework CI"

on:
  push:
    branches: [main, "drook/*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Validate framework templates
        run: mart-forge validate

      - name: Run confidentiality scan
        run: mart-forge scan

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test dependencies
        run: pip install -e ".[dev]"

      - name: Run framework tests
        run: pytest tests/ -v

  wheel-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: pip install build && python -m build

      - name: Install wheel
        run: pip install dist/mart_forge-*.whl

      - name: Verify installed CLI version
        run: mart-forge --version

      - name: Validate from installed wheel
        run: mart-forge validate

      - name: Scan from installed wheel
        run: mart-forge scan

  scaffold-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and install wheel
        run: |
          pip install build
          python -m build
          pip install dist/mart_forge-*.whl

      - name: Create signed fixture
        run: |
          mkdir -p /tmp/ci-mart
          cat > /tmp/ci-mart/brd.md << 'BRDEOF'
          # Business Requirements — CI Test Mart

          ## B-1. Scope
          Order processing for generic CI fixture test domain.

          ## B-2. Business Questions
          | ID | Question | Priority |
          |----|----------|----------|
          | Q-1 | What is total daily revenue? | High |
          | Q-2 | How many orders per day? | High |

          ## B-3. Metric Catalog
          | Metric | source_type | link_status | Definition |
          |--------|-------------|-------------|------------|
          | M-1 Revenue | native | exact | Sum of order amounts |
          | M-2 Order Count | derived | proxy | Count of distinct orders |

          ## B-4. Source-Link Evidence
          | Metric | Source | Link | Evidence |
          |--------|--------|------|----------|
          | M-1 | orders.csv | exact | Field mapping: amount -> revenue |
          | M-2 | calculated | proxy | Derived from count of ODS records |

          Sign-off: APPROVED
          Grade: A
          BRDEOF

          cat > /tmp/ci-mart/tdd.md << 'TDDEOF'
          # Technical Design Document — CI Test Mart

          ## T-1. Version History
          | Version | Date | Author | Changes |
          |---------|------|--------|---------|
          | 0.1 | 2026-01-01 | CI | Initial |

          ## T-2. Design Reasoning
          Grain: one row per order line per day.

          ## T-3. Table Summary
          | Table Name | Layer | Grain |
          |------------|-------|-------|
          | ci_ods_csv_sample | ODS | one row per record per pull_date |

          ## T-4. Data Architecture Diagram
          ODS -> DWD -> DWS -> ADS

          ## T-5. Column Specification
          Per-table specs in T-6 through T-11.

          ## T-6. ODS Table Design
          | Field | Value |
          |-------|-------|
          | Source | csv_provider |
          | Grain | One row per record per pull_date |
          | Logical Partition | pull_date |
          | Incremental Strategy | delete+insert |
          | Unique Key | ['pull_date', 'record_id'] |
          | Backfill | Full reload |
          | Restatement | Re-pull |
          | Provenance Columns | provider, pull_ts_utc, quote_ts_utc, run_id |

          Idempotence: Re-running same partition produces identical output.

          | column_name | data_type | definition | example_value | calculation | data_source |
          |-------------|-----------|------------|---------------|-------------|-------------|
          | record_id | VARCHAR | Record ID | ORD-001 | not_applicable — direct field | csv |
          | pull_date | DATE | Partition date | 2020-01-01 | not_applicable — direct field | csv |
          | amount | DECIMAL | Amount | 99.50 | not_applicable — direct field | csv |

          ## T-7. Dimension Table Design
          | column_name | data_type | definition | example_value | calculation | data_source |
          |-------------|-----------|------------|---------------|-------------|-------------|
          | date_sk | INTEGER | Key | 1 | not_applicable — from seed | dim_date |
          | calendar_date | DATE | Date | 2020-01-01 | not_applicable — from seed | dim_date |

          ## T-8. Fact Table Design (DWD)
          | column_name | data_type | definition | example_value | calculation | data_source | source_type |
          |-------------|-----------|------------|---------------|-------------|-------------|-------------|
          | order_line_sk | VARCHAR | SK | abc | md5(record_id) | derived | derived |
          | amount | DECIMAL | Amount | 99.50 | not_applicable — pass-through | ods | native |

          Provenance columns: provider, pull_ts_utc, run_id

          ## T-9. Count Aggregation Design (DWS)
          | column_name | data_type | definition | example_value | calculation | data_source |
          |-------------|-----------|------------|---------------|-------------|-------------|
          | date_key | INTEGER | FK | 1 | not_applicable — pass-through | DWD |
          | order_count | BIGINT | Count | 3 | COUNT(DISTINCT record_id) | DWD |
          | daily_revenue | DECIMAL | Revenue | 325.75 | SUM(amount) | DWD |

          ## T-10. Performance Aggregation Design (DWS)
          not_applicable rationale: No ratio metrics needed. All aggregations are count/sum in T-9.

          ## T-11. Presentation Table Design (ADS)
          | column_name | data_type | definition | example_value | calculation | data_source | BRD_ref |
          |-------------|-----------|------------|---------------|-------------|-------------|---------|
          | calendar_date | DATE | Date | 2020-01-01 | dim join | dim_date | - |
          | order_count | BIGINT | Orders | 3 | dws join | DWS | M-1 |
          | daily_revenue | DECIMAL | Revenue | 325.75 | dws join | DWS | M-2 |

          ## T-12. Physical Design
          Specs in T-6 through T-11.

          ## T-13. Implementation Specification
          dbt model configuration.

          ## T-14. DQC Plan
          All 8 control classes addressed.

          ## T-15. Test Inventory
          | Test | Type | Target |
          |------|------|--------|
          | not_null | generic | ods |

          ## T-16. Operations
          Daily at 06:00 UTC.

          ## T-17. Known Limitations
          None for fixture.

          Sign-off: APPROVED
          Grade: A
          TDDEOF

      - name: Scaffold from installed wheel
        run: mart-forge scaffold /tmp/ci-mart --name ci-test-mart --prefix ci

      - name: dbt parse
        run: dbt parse --profiles-dir . --target ci
        working-directory: /tmp/ci-mart

      - name: dbt seed
        run: dbt seed --profiles-dir . --target ci
        working-directory: /tmp/ci-mart

      - name: dbt run
        run: dbt run --profiles-dir . --target ci
        working-directory: /tmp/ci-mart

      - name: dbt test
        run: dbt test --profiles-dir . --target ci
        working-directory: /tmp/ci-mart

      - name: DQC scorecard update
        run: python scripts/dqc_update.py
        working-directory: /tmp/ci-mart

      - name: Verify scaffold output
        run: |
          echo "=== Generated files ==="
          find /tmp/ci-mart -type f | sort
          echo "=== dbt_project.yml ==="
          cat /tmp/ci-mart/dbt_project.yml
          echo "=== DQC scorecard ==="
          cat /tmp/ci-mart/dqc_scorecard.json
          echo "=== Dashboard smoke check ==="
          python -c "
          import sys
          sys.path.insert(0, '/tmp/ci-mart/dashboard')
          content = open('/tmp/ci-mart/dashboard/app.py').read()
          assert 'get_connection' in content, 'Missing DB connection'
          assert 'load_ads_data' in content, 'Missing ADS query'
          assert 'ci_ads_exec_dashboard' in content, 'Missing ADS table ref'
          print('Dashboard smoke check PASSED')
          "
