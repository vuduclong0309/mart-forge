name: "GME Options Mart CI"

on:
  push:
    paths:
      - "examples/gme-options-mart/**"
  pull_request:
    paths:
      - "examples/gme-options-mart/**"
  workflow_dispatch:
    inputs:
      live_provider:
        description: "Use live CBOE URL instead of fixture"
        type: boolean
        default: false

defaults:
  run:
    working-directory: examples/gme-options-mart

jobs:
  dbt-pipeline:
    runs-on: ubuntu-latest
    env:
      USE_FIXTURE: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.live_provider == 'true') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-duckdb

      - name: dbt seed
        run: dbt seed --profiles-dir .

      - name: dbt run
        run: dbt run --profiles-dir . --vars '{"use_fixture": ${{ env.USE_FIXTURE }}}'

      - name: dbt test
        run: dbt test --profiles-dir . --vars '{"use_fixture": ${{ env.USE_FIXTURE }}}'

      - name: Update DQC scorecard from test results
        run: python ../../scripts/dqc_update.py --run-results target/run_results.json --scorecard dqc_scorecard.json

      - name: Update DQC scorecard from test results
        run: python ../../scripts/dqc_update.py --run-results target/run_results.json --scorecard dqc_scorecard.json

      - name: Verify DQC scorecard exists
        run: test -f dqc_scorecard.json && echo "DQC scorecard present"
