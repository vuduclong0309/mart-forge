name: "GME Options Mart CI"

on:
  push:
    paths:
      - "examples/gme-options-mart/**"
  pull_request:
    paths:
      - "examples/gme-options-mart/**"
  workflow_dispatch:
    inputs:
      live_provider:
        description: "Use live CBOE URL instead of fixture"
        type: boolean
        default: false

defaults:
  run:
    working-directory: examples/gme-options-mart

jobs:
  dbt-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-duckdb

      - name: dbt seed
        run: dbt seed --profiles-dir .

      - name: dbt run
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.live_provider != 'true'
        run: dbt run --profiles-dir .

      - name: dbt run (live provider)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.live_provider == 'true'
        run: |
          dbt run --profiles-dir . --vars '{"use_fixture": false}'

      - name: dbt test
        id: dbt-test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.live_provider != 'true'
        run: dbt test --profiles-dir .

      - name: dbt test (live provider)
        id: dbt-test-live
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.live_provider == 'true'
        run: |
          dbt test --profiles-dir . --vars '{"use_fixture": false}'

      - name: Save committed scorecard for freshness check
        if: always() && (steps.dbt-test.outcome == 'success' || steps.dbt-test.outcome == 'failure' || steps.dbt-test-live.outcome == 'success' || steps.dbt-test-live.outcome == 'failure')
        run: cp dqc_scorecard.json dqc_scorecard_committed.json

      - name: Update DQC scorecard from test results
        if: always() && (steps.dbt-test.outcome == 'success' || steps.dbt-test.outcome == 'failure' || steps.dbt-test-live.outcome == 'success' || steps.dbt-test-live.outcome == 'failure')
        run: python ../../scripts/dqc_update.py --run-results target/run_results.json --scorecard dqc_scorecard.json

      - name: Verify committed scorecard is fresh
        if: always() && (steps.dbt-test.outcome == 'success' || steps.dbt-test.outcome == 'failure' || steps.dbt-test-live.outcome == 'success' || steps.dbt-test-live.outcome == 'failure')
        run: |
          python -c "
          import json, sys

          def strip_volatile(sc):
              sc = dict(sc)
              sc.pop('generated_at', None)
              for c in sc.get('controls', []):
                  c.pop('verified_at', None)
                  c.pop('last_dbt_run', None)
              return sc

          committed = strip_volatile(json.load(open('dqc_scorecard_committed.json')))
          fresh = strip_volatile(json.load(open('dqc_scorecard.json')))

          if committed != fresh:
              print('ERROR: Committed dqc_scorecard.json is stale.', file=sys.stderr)
              print('Re-run dbt test + dqc_update.py and commit the updated scorecard.', file=sys.stderr)
              sys.exit(1)
          print('OK: Committed scorecard matches current test results.')
          "
