name: "E-Commerce Mart CI"

on:
  push:
    paths:
      - "examples/ecommerce-orders-mart/**"
  pull_request:
    paths:
      - "examples/ecommerce-orders-mart/**"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: examples/ecommerce-orders-mart

jobs:
  dbt-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-duckdb

      - name: dbt seed
        run: dbt seed --profiles-dir .

      - name: dbt run
        run: dbt run --profiles-dir .

      - name: dbt test
        run: dbt test --profiles-dir .

      - name: Verify DQC scorecard exists
        run: test -f dqc_scorecard.json && echo "DQC scorecard present"
